version: 2
updates:
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
    # Conventional Commit titles so release-please versions them.
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
