name: security_doctor_lints
description: >-
  IDE lints for security_doctor: OWASP MASVS and CWE mapped security
  findings from SD001-SD004 and SD008 shown right in the editor, with
  quick fixes, via custom_lint.
version: 0.1.0
repository: https://github.com/PopovVA/security_doctor_lints

environment:
  sdk: ^3.5.0

# The example hardcodes fake credentials on purpose — it demonstrates
# what these lints detect.
false_secrets:
  - /example/lib/main.dart

dependencies:
  analyzer: ^8.0.0
  custom_lint_builder: ^0.8.1
  security_doctor: ^0.5.0

dev_dependencies:
  custom_lint: ^0.8.1
  lints: ^6.1.0
  test: ^1.31.0
